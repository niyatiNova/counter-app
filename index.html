<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="webpage-content">
        <div id="main">
            <p>Counter App</p>
        </div>
        <div id="count">
            <span>0</span>
        </div>
       <div class="buttons">

            <button>+</button>
        </div>
        <div id="dec-button">
            <button>-</button>
        </div>
       </div>
       <div class="resetbtn"> 
        <div id="reset">
            <button>Reset</button>
        </div>
    </div>
      
    </div>
<script src="script.js"></script>
    
</body>
</html>
